version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/multi_agent
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AUTO_MIGRATE_ON_STARTUP: "true"
      DB_INIT_MAX_ATTEMPTS: "60"
      DB_INIT_RETRY_SECONDS: "2"
    ports:
      - "8000:8000"

volumes:
  postgres_data: